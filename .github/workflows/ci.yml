name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check rag_engine/ tests/

      - name: Type check with mypy
        run: mypy rag_engine/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: rag_engine
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rag -d rag_engine"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short -m "not integration"
        env:
          DATABASE_URL: postgresql+asyncpg://rag:changeme@localhost:5432/rag_engine
          OPENAI_API_KEY: sk-test-not-real

      - name: Run tests with coverage
        run: pytest tests/unit/ --cov=rag_engine --cov-report=xml -m "not integration"
        env:
          DATABASE_URL: postgresql+asyncpg://rag:changeme@localhost:5432/rag_engine
          OPENAI_API_KEY: sk-test-not-real

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rag-engine:test .

      - name: Verify Docker image
        run: docker run --rm rag-engine:test python -c "import rag_engine; print(rag_engine.__version__)"
